<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 22px;
      width: 980px;
      background: #101114;
      color: #f1f3f5;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .report {
      width: 936px;
      overflow: hidden;
      border-radius: 8px;
      background: #23262b;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .header {
      padding: 20px 24px 16px;
      background: linear-gradient(135deg, #334052 0%, #292f38 58%, #22262c 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: 30px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .time {
      flex: 0 0 auto;
      margin-top: 5px;
      color: #aeb8c4;
      font-size: 15px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 8px;
      color: #d8dee7;
      font-size: 18px;
      line-height: 1.38;
    }

    .scene {
      margin-top: 8px;
      color: #9fb2c8;
      font-size: 16px;
      line-height: 1.35;
    }

    .prompt {
      margin: 14px 24px 0;
      padding: 12px 14px;
      color: #e8edf3;
      background: rgba(255, 255, 255, 0.055);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 7px;
      font-size: 17px;
      line-height: 1.42;
    }

    .body {
      padding: 16px 18px 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 17px;
      overflow: hidden;
      border-radius: 7px;
    }

    th {
      padding: 11px 10px;
      color: #aebed0;
      background: #191e25;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 800;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    th:nth-child(1) {
      width: 68px;
    }

    th:nth-child(2) {
      width: 272px;
    }

    th:nth-child(3) {
      width: 104px;
    }

    td {
      padding: 11px 10px;
      vertical-align: top;
      color: #edf1f5;
      line-height: 1.36;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      overflow-wrap: anywhere;
    }

    tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.025);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .rank {
      color: #f1c56c;
      font-weight: 900;
      white-space: nowrap;
    }

    .runner {
      color: #fff;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 900;
    }

    .meta {
      margin-top: 4px;
      color: #9ca8b8;
      font-size: 14px;
      line-height: 1.3;
    }

    .tag {
      display: inline-block;
      min-width: 76px;
      padding: 4px 8px;
      border-radius: 6px;
      color: #e4edf8;
      background: rgba(87, 148, 206, 0.18);
      border: 1px solid rgba(126, 183, 235, 0.2);
      text-align: center;
      white-space: nowrap;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
    }

    .state {
      color: #dce5ef;
      font-size: 16px;
      line-height: 1.42;
    }

    .highlights {
      margin: 14px 0 0;
      padding: 14px 16px 14px 32px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: 7px;
    }

    .highlights li {
      margin: 0 0 7px;
      color: #d9e1eb;
      font-size: 16px;
      line-height: 1.4;
    }

    .highlights li:last-child {
      margin-bottom: 0;
    }

    .awards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .award {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 6px;
      color: #1d241f;
      background: #8fe1ad;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 900;
      white-space: nowrap;
    }

    .no-awards .awards {
      display: none;
    }
  </style>
</head>
<body class="{{typeClass}} {{hasAwardsClass}}">
  <main class="report">
    <section class="header">
      <div class="title-row">
        <h1>{{title}}</h1>
        <div class="time">{{generatedAt}}</div>
      </div>
      <div class="subtitle">{{subtitle}}</div>
      <div class="scene">{{scene}}</div>
    </section>
    <div class="prompt">{{prompt}}</div>
    <section class="body">
      <table>
        <thead>
          <tr>
            <th>名次</th>
            <th>选手</th>
            <th>策略</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody>
          {{@ rankRowsHtml}}
        </tbody>
      </table>
      <ul class="highlights">
        {{@ highlightsHtml}}
      </ul>
      <div class="awards">
        {{@ awardsHtml}}
      </div>
    </section>
  </main>
</body>
</html>
