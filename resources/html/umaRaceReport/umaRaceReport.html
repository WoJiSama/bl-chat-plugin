<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{title}}</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 22px;
      width: 980px;
      background: #101114;
      color: #f1f3f5;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    .report {
      width: 936px;
      overflow: hidden;
      border-radius: 8px;
      background: #23262b;
      border: 1px solid rgba(255, 255, 255, 0.09);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .header {
      padding: 20px 24px 16px;
      background: linear-gradient(135deg, #334052 0%, #292f38 58%, #22262c 100%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      color: #fff;
      font-size: 30px;
      line-height: 1.18;
      font-weight: 900;
      letter-spacing: 0;
    }

    .time {
      flex: 0 0 auto;
      margin-top: 5px;
      color: #aeb8c4;
      font-size: 15px;
      line-height: 1.35;
      white-space: nowrap;
    }

    .subtitle {
      margin-top: 8px;
      color: #d8dee7;
      font-size: 18px;
      line-height: 1.38;
    }

    .scene {
      margin-top: 8px;
      color: #9fb2c8;
      font-size: 16px;
      line-height: 1.35;
    }

    .prompt {
      margin: 14px 0 0;
      padding: 12px 14px;
      color: #e8edf3;
      background: rgba(241, 197, 108, 0.09);
      border: 1px solid rgba(241, 197, 108, 0.2);
      border-radius: 7px;
      font-size: 17px;
      line-height: 1.42;
    }

    .body {
      padding: 16px 18px 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 17px;
      overflow: hidden;
      border-radius: 7px;
    }

    th {
      padding: 11px 10px;
      color: #aebed0;
      background: #191e25;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 800;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    th:nth-child(1) {
      width: 68px;
    }

    th:nth-child(2) {
      width: 272px;
    }

    th:nth-child(3) {
      width: 104px;
    }

    td {
      padding: 11px 10px;
      vertical-align: top;
      color: #edf1f5;
      line-height: 1.36;
      border-bottom: 1px solid rgba(255, 255, 255, 0.055);
      overflow-wrap: anywhere;
    }

    tr:nth-child(even) td {
      background: rgba(255, 255, 255, 0.025);
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .rank {
      color: #f1c56c;
      font-weight: 900;
      white-space: nowrap;
    }

    .runner {
      color: #fff;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 900;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 6px;
    }

    .runner-affix {
      display: inline-block;
      margin-right: 2px;
      font-weight: 900;
    }

    .affix-broken {
      color: #9aa0a8;
      text-shadow: 0 0 8px rgba(154, 160, 168, 0.1);
    }

    .affix-cursed {
      color: #ff6b7a;
      text-shadow: 0 0 10px rgba(255, 107, 122, 0.32);
    }

    .affix-common {
      color: #d7e0ea;
      text-shadow: 0 0 8px rgba(215, 224, 234, 0.12);
    }

    .affix-good {
      color: #7bd88f;
      text-shadow: 0 0 9px rgba(123, 216, 143, 0.25);
    }

    .affix-rare {
      color: #7fc7ff;
      text-shadow: 0 0 9px rgba(127, 199, 255, 0.28);
    }

    .affix-epic {
      color: #c39bff;
      text-shadow: 0 0 10px rgba(195, 155, 255, 0.32);
    }

    .affix-shiny {
      color: #ffd36f;
      text-shadow: 0 0 10px rgba(255, 211, 111, 0.38);
    }

    .runner-name {
      color: #fff;
    }

    .npc-mark {
      display: inline-block;
      padding: 2px 5px;
      border-radius: 5px;
      color: #9ca8b8;
      background: rgba(255, 255, 255, 0.07);
      font-size: 12px;
      line-height: 1.2;
      vertical-align: 2px;
      font-weight: 900;
    }

    .runner-gap {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 5px;
      color: #f1c56c;
      background: rgba(241, 197, 108, 0.1);
      border: 1px solid rgba(241, 197, 108, 0.18);
      font-size: 12px;
      line-height: 1.2;
      font-weight: 900;
      white-space: nowrap;
    }

    .meta {
      margin-top: 4px;
      color: #9ca8b8;
      font-size: 14px;
      line-height: 1.3;
    }

    .tag {
      display: inline-block;
      min-width: 76px;
      padding: 4px 8px;
      border-radius: 6px;
      color: #e4edf8;
      background: rgba(87, 148, 206, 0.18);
      border: 1px solid rgba(126, 183, 235, 0.2);
      text-align: center;
      white-space: nowrap;
      font-size: 14px;
      line-height: 1.25;
      font-weight: 800;
    }

    .state {
      color: #dce5ef;
      font-size: 16px;
      line-height: 1.42;
    }

    .highlights {
      margin: 14px 0 0;
      padding: 14px 16px 14px 32px;
      background: rgba(255, 255, 255, 0.045);
      border: 1px solid rgba(255, 255, 255, 0.075);
      border-radius: 7px;
    }

    .highlights li {
      margin: 0 0 7px;
      color: #d9e1eb;
      font-size: 16px;
      line-height: 1.4;
    }

    .highlights li:last-child {
      margin-bottom: 0;
    }

    .awards {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .award {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 5px 10px;
      border-radius: 6px;
      color: #1d241f;
      background: #8fe1ad;
      font-size: 15px;
      line-height: 1.25;
      font-weight: 900;
      white-space: nowrap;
    }

    .no-awards .awards {
      display: none;
    }

    .proficiency {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 7px;
      background: rgba(92, 171, 155, 0.12);
      border: 1px solid rgba(112, 214, 190, 0.18);
    }

    .prof-title {
      margin: 0 0 10px;
      color: #dffbf4;
      font-size: 18px;
      line-height: 1.25;
      font-weight: 900;
    }

    .prof-runner {
      display: grid;
      grid-template-columns: 160px 1fr;
      gap: 12px;
      padding: 10px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .prof-runner:first-of-type {
      border-top: 0;
      padding-top: 0;
    }

    .prof-name {
      color: #fff;
      font-size: 17px;
      line-height: 1.35;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .prof-list {
      display: grid;
      gap: 8px;
    }

    .prof-item {
      min-width: 0;
    }

    .prof-main {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 24px;
      font-size: 15px;
      line-height: 1.25;
    }

    .prof-action {
      color: #edf8f5;
      font-weight: 900;
    }

    .prof-gain {
      min-width: 42px;
      padding: 3px 7px;
      border-radius: 6px;
      color: #10241f;
      background: #8fe1d0;
      font-weight: 900;
      text-align: center;
    }

    .prof-level {
      color: #aee7dc;
      font-weight: 800;
    }

    .prof-progress {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) 210px;
      align-items: center;
      gap: 10px;
      margin-top: 5px;
    }

    .prof-bar {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
    }

    .prof-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #70d6be, #f1c56c);
    }

    .prof-num {
      color: #aab8c5;
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
    }

    .no-proficiency .proficiency {
      display: none;
    }
  </style>
</head>
<body class="{{typeClass}} {{hasAwardsClass}} {{hasProficiencyClass}}">
  <main class="report">
    <section class="header">
      <div class="title-row">
        <h1>{{title}}</h1>
        <div class="time">{{generatedAt}}</div>
      </div>
      <div class="subtitle">{{subtitle}}</div>
      <div class="scene">{{scene}}</div>
      <div class="prompt">{{prompt}}</div>
    </section>
    <section class="body">
      <table>
        <thead>
          <tr>
            <th>名次</th>
            <th>选手</th>
            <th>策略</th>
            <th>状态</th>
          </tr>
        </thead>
        <tbody>
          {{@ rankRowsHtml}}
        </tbody>
      </table>
      <ul class="highlights">
        {{@ highlightsHtml}}
      </ul>
      <div class="awards">
        {{@ awardsHtml}}
      </div>
      <section class="proficiency">
        <h2 class="prof-title">熟练度提升</h2>
        {{@ proficiencyHtml}}
      </section>
    </section>
  </main>
</body>
</html>
