pluginSettings:
  enabled: true
  botName: 哈基米
  groupHistory: true
  useTools: true
  concurrentLimit: 3
  triggerPrefixes:
    - 哈基米
  excludeMessageTypes:
    - file
  allowedGroups:
    - "973682389"
  enableGroupWhitelist: true
  whitelistRejectMsg: 本群未开启此功能哦~
  groupMaxMessages: 100
  groupChatMemoryDays: 1
  maxToolRounds: 5
  conversationTrackingEnabled: false
  conversationTrackingTimeout: 2
  conversationTrackingThrottle: 3
  batchJudgmentDelay: 10
  # 对话触发模式：strict=严格模式（必须 @/前缀才回，默认）；smart=智能模式（按 talkValue 频率让 Gate 子代理判断是否插话）
  chatTriggerMode: strict
  # smart 模式专属配置
  smartTrigger:
    talkValue: 0.3                       # 频率 0.01-1.0；1=每条消息都跑 Gate（token 消耗大），0.3=约 4 条触发一次（推荐折中），0.1=10 条触发一次
    idleCompensationEnabled: true        # 冷群空窗补偿：按时间折算等效消息数凑触发条件
    avgLatencyDefaultMs: 60000           # 平均回复延迟初始值（冷启动 fallback）
    timingGateCooldownSeconds: 8         # Gate 判 no_action 后的冷却秒数
    gateContextSize: 10                  # 喂给 Gate 的群历史条数（越大决策越准但 token 越贵）
    waitToolEnabled: true                # 是否暴露 wait 工具给 LLM
    inevitableAtReply: true              # 命中 @bot 或 triggerPrefixes 时强制回复（跳过 Gate/cooldown/threshold/debounce）；两种命中走同一路径
    mentionedNameReply: false            # 非 @ 且不在 triggerPrefixes 里，但消息含 botName 时也强制触发
    enableTalkValueRules: false          # 启用时段化频率（夜间安静 / 白天活跃）
    talkValueRules:
      - { range: "00:00-08:59", value: 0.3 }
      - { range: "09:00-22:59", value: 1.0 }
      - { range: "23:00-23:59", value: 0.5 }
    replyDebounceMs: 800                 # 准备回复前先等待这么久看有没有新消息（防"对方没说完就抢答"）；0=关
    maxConsecutiveInterrupts: 3          # 同一群被新消息连续打断的最大次数；超过后强制走完不再让步；0=每次都让步
    activeChatTtlHours: 24               # 群超过这么多小时没有新消息后从内存状态淘汰
    recentReplyWindowSeconds: 60         # bot 最近 N 秒内发过回复则下一条消息跳过 talkValue 阈值检查（仍走 Gate 判断），让 bot 主动接续对话；0=关
    typingSpeed: 0                       # 拟人化打字速度：每秒发送 N 个字符（调节段间延迟，两种模式都生效）；0=默认公式(1s起步+字符延展)，建议 8-25
  # 对方画像注入：每次回复前自动注入对方昵称/长期记忆/最近发言到 system prompt（增强"熟人感"）
  personProfileInjection:
    enabled: true
    maxRecentMessages: 3                 # 注入近期发言条数上限
  providers: oneapi
  systemContent: 你的名字叫哈基米，你是一个热心的群友，可以热心的解决群友的问题，文明的和群友聊天
  forcedAvatarMode: true
  trackAiConfig: {
    trackAiUrl: https://api.openai.com/v1/chat/completions,
    trackAiModel: gpt-4o-mini,
    trackAiApikey: sk-xxxxx
  }
  toolsAiConfig: {
    toolsAiUrl: https://api.openai.com/v1/chat/completions,
    toolsAiModel: gemini-2.5-flash,
    toolsAiApikey: sk-xxxxx
  }
  chatAiConfig: {
    chatApiUrl: https://api.openai.com/v1/chat/completions,
    chatApiModel: gemini-2.5-pro,
    chatApiKey: sk-xxxxx
  }
  imageEditAiConfig: {
    imageEditApiUrl: https://api.openai.com/v1/chat/completions,
    imageEditApiModel: gemini-3-pro-image-preview,
    imageEditApiKey: sk-xxxxx
  }
  analysisAiConfig: {
    analysisApiUrl: https://api.openai.com/v1/chat/completions,
    analysisApiModel: gemini-3-pro-preview,
    analysisApiKey: sk-xxxxx
  }
  searchAiConfig: {
    searchApiUrl: https://api.openai.com/v1/chat/completions,
    searchApiModel: deepseek-r1-search,
    searchApiKey: sk-xxxxx
  }
  memoryAiConfig: {
    memoryAiUrl: https://api.openai.com/v1/chat/completions,
    memoryAiModel: gpt-4o-mini,
    memoryAiApikey: sk-xxxxx
  }
  emotionSystem:
    enabled: true
    decayRate: 0.02
    eventWeights:
      praised: 0.1
      scolded: -0.15
      ignored: -0.05
      mentioned: 0.05
  memorySystem:
    enabled: false
    maxFactsPerUser: 100
    maxFactsPerGroup: 50
    importanceThreshold: 0.5
    memoryDecayDays: 7
    userExtractDebounceSeconds: 90
    userExtractMaxBatchMessages: 6
    groupExtractMinIntervalMinutes: 10
    groupExtractMaxBatchMessages: 12
    promptMaxUserFacts: 8
    promptMaxGroupFacts: 6
    promptMaxChars: 1200
    semanticRecallEnabled: false
    semanticRecallTopK: 20
  expressionLearning:
    enabled: true
    minWordFrequency: 3
    maxWords: 50
    blockedWords: []
    aiLearningEnabled: true
    aiLearningMessageThreshold: 50
  knowledgeSystem:
    enabled: false
    topN: 10
    threshold: 0.35
  embeddingAiConfig:
    embeddingApiUrl: https://api.openai.com/v1/embeddings
    embeddingApiModel: text-embedding-3-small
    embeddingApiKey: sk-xxxxx
  emojiSystem:
    enabled: false
    dbPath: plugins/bl-chat-plugin/database/emoji-packs.ndjson
    storeDir: plugins/bl-chat-plugin/database/emoji_files
    maxItems: 200
    autoCollect: false
    visionTagOnAdd: true
    useEmbedding: true
    selectionTopK: 5
    embeddingThreshold: 0.35
    contentFiltration: false
    doReplace: false
    enableMaintenance: false
    checkIntervalMinutes: 10
    avoidRecentEnabled: true
    avoidRecentCount: 5
    avoidRecentTtlMinutes: 5
    followUpDelayMinMs: 300
    followUpDelayMaxMs: 1200
    rateLimitEnabled: true
    rateLimitWindowMinutes: 1
    rateLimitMaxPerWindow: 3
  openai_tool_choice: auto
  oneapi_tools:
    - likeTool
    - pokeTool
    - googleImageAnalysisTool
    - aiMindMapTool
    - bananaTool(dedupe)
    - bingImageSearchTool
    - changeCardTool
    - chatHistoryTool
    - githubRepoTool
    - googleImageEditTool(dedupe)
    - jinyanTool
    - qqZoneTool
    - searchInformationTool
    - searchMusicTool
    - searchVideoTool
    - videoAnalysisTool(dedupe)
    - voiceTool
    - webParserTool
    - reactionTool
    - memberInfoTool
    - recallTool
    - reminderTool
    - textImageTool
    - waitTool                            # 拟人化"稍后再说一句"；仅 chatTriggerMode=smart 且 smartTrigger.waitToolEnabled=true 时才会暴露给 LLM
  githubToken: ""
  qqMusicToken: ""
